<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Emotion Detector</title>
    <style>
        :root {
            --bg: #0b1220;
            --panel: rgba(17,24,39,0.55);
            --border: rgba(255,255,255,0.08);
            --text: #e5e7eb;
            --muted: #94a3b8;
            --accent: #8b5cf6;
            --accent-2: #22d3ee;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 20% 20%, rgba(99,102,241,0.18), transparent 35%),
                        radial-gradient(circle at 80% 10%, rgba(34,211,238,0.12), transparent 30%),
                        radial-gradient(circle at 50% 80%, rgba(139,92,246,0.12), transparent 35%),
                        var(--bg);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--text);
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            background: linear-gradient(145deg, rgba(17,24,39,0.7), rgba(15,23,42,0.6));
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 36px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.03);
            backdrop-filter: blur(12px);
        }
        .logo {
            width: 54px;
            height: 54px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            display: grid;
            place-items: center;
            font-size: 26px;
            color: white;
            margin: 0 auto 14px auto;
            box-shadow: 0 12px 30px rgba(139,92,246,0.35);
        }
        h1 {
            text-align: center;
            margin: 0 0 8px;
            font-size: 1.9em;
            letter-spacing: 0.2px;
        }
        .subtitle {
            text-align: center;
            color: var(--muted);
            margin-bottom: 28px;
            font-size: 0.98em;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text);
            font-size: 0.95em;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1em;
            background: rgba(255,255,255,0.03);
            color: var(--text);
            transition: border-color 0.25s, box-shadow 0.25s, background-color 0.25s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: rgba(139,92,246,0.8);
            outline: none;
            box-shadow: 0 0 0 3px rgba(139,92,246,0.18);
            background-color: rgba(255,255,255,0.06);
        }
        button:not(.toggle-pass) {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-size: 1.05em;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.2s ease;
            box-shadow: 0 14px 35px rgba(99,102,241,0.35);
        }
        button:not(.toggle-pass):hover { transform: translateY(-1px) scale(1.003); }
        button:not(.toggle-pass):active { transform: translateY(0); box-shadow: 0 10px 28px rgba(99,102,241,0.3); }
        .info {
            margin-top: 16px;
            font-size: 0.9em;
            color: var(--muted);
            text-align: center;
        }
        .pill {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.06);
            color: var(--text);
            font-weight: 600;
            letter-spacing: 0.2px;
        }
        .flash {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .flash.error {
            background: rgba(239,68,68,0.12);
            border-color: rgba(239,68,68,0.5);
            color: #fecdd3;
        }
        .flash.success {
            background: rgba(34,197,94,0.12);
            border-color: rgba(34,197,94,0.5);
            color: #bbf7d0;
        }
        .input-wrap { position: relative; width: 100%; }
        .input-wrap input { width: 100%; display: block; padding-right: 48px; }
        .toggle-pass {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            transition: none;
            box-shadow: none;
        }
        .toggle-pass:hover { color: inherit; background: transparent; transform: translateY(-50%); box-shadow: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🎵</div>
        <h1>Welcome back</h1>
        <div class="subtitle">Sign in to explore lyric emotions</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                    <button type="button" class="toggle-pass" data-target="password" aria-label="Show password"><span aria-hidden="true"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8"></path><line x1="2" y1="2" x2="22" y2="22"></line></svg></span></button>
                </div>
            </div>
            <div class="form-group" style="display:flex;align-items:center;gap:8px;margin-top:-4px;">
                <input type="checkbox" id="remember" name="remember" style="width:16px;height:16px;">
                <label for="remember" style="margin:0;">Remember me</label>
            </div>
            <button type="submit">Log In</button>
        </form>
        <div class="info">
            New here?
            <a href="{{ url_for('signup') }}" style="color: var(--accent); text-decoration: none; font-weight: 600;">Create an account</a>
        </div>
    </div>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
      var toggles = document.querySelectorAll('.toggle-pass');
      for (var i = 0; i < toggles.length; i++) {
        toggles[i].addEventListener('click', function(e) {
          var btn = e.currentTarget;
          var inputId = btn.getAttribute('data-target');
          var input = document.getElementById(inputId);
          if (!input) return;
          var show = input.type === 'password';
          input.type = show ? 'text' : 'password';
          btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
          var svgOpen = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8"></path><circle cx="12" cy="12" r="3"></circle></svg>';
          var svgClosed = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8"></path><line x1="2" y1="2" x2="22" y2="22"></line></svg>';
          btn.innerHTML = '<span aria-hidden="true">' + (show ? svgOpen : svgClosed) + '</span>';
        });
      }
    });
    </script>
</body>
</html>
